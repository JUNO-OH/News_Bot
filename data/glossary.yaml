금리: "돈을 빌릴 때 내는 비용입니다. 금리가 오르면 대출 부담이 커지고, 기업 투자와 소비가 줄어들 수 있습니다."
환율: "서로 다른 나라 돈의 교환 비율입니다. 원/달러 환율이 오르면 원화 가치가 약해졌다는 뜻입니다."
인플레이션: "물가가 전반적으로 오르는 현상입니다. 구매력이 떨어지고 중앙은행이 금리를 높일 가능성이 커집니다."
국채금리: "정부가 돈을 빌릴 때 약속하는 이자율입니다. 시장 금리의 기준 역할을 하며 주식 밸류에이션에도 영향을 줍니다."
HBM: "고대역폭 메모리입니다. AI 반도체가 대량의 데이터를 빠르게 처리하도록 돕는 핵심 메모리입니다."
데이터센터: "서버와 네트워크 장비를 모아 대규모 데이터를 저장·처리하는 시설입니다. AI 서비스 확대로 전력과 반도체 수요가 함께 늘 수 있습니다."
